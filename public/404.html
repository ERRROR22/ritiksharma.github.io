<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ritik Sharma | Portfolio</title>
    <script type="text/javascript">
      // This script checks if the page is a 404 and redirects back to index.html
      // while preserving the original route in the URL.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
